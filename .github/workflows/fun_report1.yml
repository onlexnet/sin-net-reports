name: "CI fun_report1"

concurrency:
  group: "fun_raport1"
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - fun_report1/**
      - infra/**
      - .github/workflows/fun_report1.yml
  pull_request:
    branches: [ main ]
    paths:
      - fun_report1/**
      - infra/**
      - .github/workflows/fun_report1.yml

permissions:
  contents: read

jobs:
  Quality:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint workflow files with actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          # Extract workflow file path from GITHUB_WORKFLOW_REF (e.g., "owner/repo/.github/workflows/fun_report1.yml@refs/heads/main")
          # This ensures actionlint only checks the current workflow file, not all workflows
          temp="${GITHUB_WORKFLOW_REF%@*}"
          WORKFLOW_FILE=".github${temp##*/.github}"
          ./actionlint -color "$WORKFLOW_FILE"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: fun_report1
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements.txt

      - name: Ruff
        working-directory: fun_report1
        run: ruff check .

      - name: Mypy
        working-directory: fun_report1
        run: mypy --config-file mypy.ini

      - name: Pytest with coverage and JUnit
        working-directory: fun_report1
        run: |
          mkdir -p reports
          pytest --junitxml=reports/junit.xml --cov-report=xml:reports/coverage.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: fun_report1-test-reports
          path: |
            fun_report1/reports/junit.xml
            fun_report1/reports/coverage.xml
          if-no-files-found: warn

  Deploy:
    name: Deploy to PRD01
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ Quality ]
    runs-on: ubuntu-22.04
    environment: PRD01
    env:
      AZURE_FUNCTIONAPP_NAME: ${{ vars.ONLEXNET_SINNET_PRD01_FUNCTION_REPORT_NAME }}
      AZURE_FUNCTIONAPP_PACKAGE_PATH: 'fun_report1'       # set this to the path to your function app project, defaults to the repository root
      PYTHON_VERSION: '3.13'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ONLEXNET_INFRA_CLIENT_ID }}","clientSecret":"${{ secrets.ONLEXNET_INFRA_SECRET }}","subscriptionId":"${{ secrets.ONLEXNET_SINNET_PRD01_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ONLEXNET_TENANT_ID }}"}'

      # Deploy source code to Azure Functions with remote build
      # scm-do-build-during-deployment: Enables remote build on Azure (required for Linux Consumption + RBAC)
      # enable-oryx-build: Uses Oryx to install dependencies from requirements.txt on Azure side
      # Do NOT install dependencies locally - Azure Oryx handles this automatically
      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
